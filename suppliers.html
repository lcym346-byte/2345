<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>供應商管理 - 多店叫貨系統</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/page.css">
</head>
<body>

  <header class="top-bar">
    <a href="index.html" class="btn-back">← 返回</a>
    <div class="top-title">供應商管理</div>
    <button id="addBtn" class="btn-add">+ 新增</button>
  </header>

  <main class="page-content">
    <div id="supplierList" class="card-list"></div>
    <p id="emptyMsg" class="empty-msg" style="display:none;">尚無供應商資料</p>
  </main>

  <div id="modal" class="modal-mask" style="display:none;">
    <div class="modal-box">
      <h2 id="modalTitle">新增供應商</h2>
      <label>供應商代碼 <span class="required">*</span></label>
      <input type="text" id="fCode" placeholder="例如：SUP001">
      <label>供應商名稱 <span class="required">*</span></label>
      <input type="text" id="fName" placeholder="供應商名稱">
      <label>聯絡人</label>
      <input type="text" id="fContact" placeholder="聯絡人姓名">
      <label>電話</label>
      <input type="text" id="fPhone" placeholder="聯絡電話">
      <label>Email</label>
      <input type="email" id="fEmail" placeholder="email@example.com">
      <label>地址</label>
      <input type="text" id="fAddress" placeholder="供應商地址">
      <label>備註</label>
      <input type="text" id="fNote" placeholder="付款條件等">
      <label>狀態</label>
      <select id="fActive">
        <option value="true">啟用</option>
        <option value="false">停用</option>
      </select>
      <div class="modal-actions">
        <button id="cancelBtn" class="btn-cancel">取消</button>
        <button id="saveBtn" class="btn-primary">儲存</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/pages/suppliers-page.js"></script>
</body>
</html>
